<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>こころノート</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{--bg:#faf8f5;--white:#fff;--green:#8fa395;--green-deep:#6d8576;--bubble:#e8eee9;--text:#3d3d3d;--muted:#6b6b6b;--danger:#e85d5d;--sh:rgba(80,70,60,.08)}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;min-height:100dvh;font-family:"Noto Sans JP",sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
header{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,rgba(250,248,245,.98),rgba(250,248,245,.92));backdrop-filter:blur(8px);border-bottom:1px solid rgba(143,163,149,.25);padding:max(14px,env(safe-area-inset-top)) 20px 14px}
.header-inner{max-width:560px;margin:0 auto}
.brand{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
.logo{font-weight:600;font-size:1.25rem;letter-spacing:.04em}
.subtitle{width:100%;margin-top:4px;font-size:.8125rem;color:var(--muted)}
.rally-pill{font-size:.8125rem;color:var(--green-deep);background:var(--bubble);padding:6px 12px;border-radius:999px;white-space:nowrap}
main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#chat-log{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px 148px;max-width:560px;margin:0 auto;width:100%}
.row{display:flex;margin-bottom:14px;align-items:flex-end}
.row.ai{justify-content:flex-start}
.row.user{justify-content:flex-end}
.bubble{max-width:88%;padding:14px 16px;border-radius:18px;font-size:.9375rem;line-height:1.65;box-shadow:0 4px 20px var(--sh);word-break:break-word}
.row.ai .bubble{background:var(--white);border-bottom-left-radius:6px}
.row.user .bubble{background:var(--bubble);border-bottom-right-radius:6px}
.bubble.err{background:#fff5f5;color:#8a4444;border:1px solid rgba(232,93,93,.25)}
.composer-area{position:fixed;bottom:0;left:0;right:0;padding:12px 16px calc(14px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(250,248,245,0),var(--bg) 18%);border-top:1px solid rgba(143,163,149,.2)}
.composer-inner{max-width:560px;margin:0 auto}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.btn-icon{min-width:46px;height:46px;padding:0 12px;border-radius:999px;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;background:var(--white);color:var(--green-deep);box-shadow:0 2px 12px var(--sh);flex-shrink:0;font-family:inherit;font-size:.75rem;font-weight:500}
.btn-icon.mic{width:46px;min-width:46px;padding:0;font-size:1.1rem}
.btn-icon:active{transform:scale(.96)}.btn-icon.tts-on{background:var(--bubble)}
.btn-icon[disabled]{opacity:.45;cursor:not-allowed}
.btn-icon.mic.recording{background:var(--danger);color:#fff;animation:mp 1s ease-in-out infinite}
@keyframes mp{0%,100%{opacity:1}50%{opacity:.65}}
.input-row{display:flex;gap:10px;align-items:flex-end}
#message-input{flex:1;min-height:48px;max-height:140px;resize:none;border:1px solid rgba(143,163,149,.45);border-radius:16px;padding:12px 14px;font-family:inherit;font-size:1rem;line-height:1.5;background:var(--white);color:var(--text)}
#message-input:focus{outline:2px solid rgba(109,133,118,.35)}#message-input:disabled{background:#f0ede8;color:var(--muted)}
.btn-send{min-width:72px;height:48px;border:none;border-radius:14px;background:var(--green);color:#fff;font-family:inherit;font-weight:600;font-size:.9375rem;cursor:pointer;box-shadow:0 4px 14px rgba(109,133,118,.35);flex-shrink:0}
.btn-send:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
.limit-note{max-width:560px;margin:0 auto 8px;padding:0 16px;font-size:.875rem;color:var(--muted);text-align:center;display:none}
.limit-note.visible{display:block}
.hint{margin-top:8px;font-size:.75rem;color:var(--muted);text-align:center}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
</style>
</head>
<body>
<header><div class="header-inner"><div class="brand"><span class="logo">こころノート</span><span class="rally-pill" id="rally-display" aria-live="polite">残り 5 回</span></div><p class="subtitle">5分で気持ちを整えるAI</p></div></header>
<p class="limit-note" id="limit-note" aria-live="assertive"></p>
<main><div id="chat-log" role="log" aria-label="チャットメッセージ"></div></main>
<div class="composer-area"><div class="composer-inner"><div class="toolbar">
<button type="button" class="btn-icon tts-on" id="btn-tts" aria-pressed="true">読み上げ ON</button>
<button type="button" class="btn-icon mic" id="btn-mic" aria-label="音声入力">🎤</button>
</div><div class="input-row">
<label class="sr-only" for="message-input">メッセージ入力</label>
<textarea id="message-input" rows="2" placeholder="気持ちを書いてみましょう" autocomplete="off"></textarea>
<button type="button" class="btn-send" id="btn-send">送信</button>
</div><p class="hint">Enter で改行 · Enter を続けて2回で送信</p></div></div>
<script>
(function(){
"use strict";
var SK="kokoro-note-rallies-v1",LIM=5,DBL=700;
var logEl=document.getElementById("chat-log"),inp=document.getElementById("message-input"),bSend=document.getElementById("btn-send"),bMic=document.getElementById("btn-mic"),bTts=document.getElementById("btn-tts"),rallyEl=document.getElementById("rally-display"),limEl=document.getElementById("limit-note");
var apiMsgs=[],ttsOn=true,lastEnt=0,aud=null,reco=null,recOn=false,sending=false,micOk=!!(window.SpeechRecognition||window.webkitSpeechRecognition);

function ymd(){var p=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Tokyo",year:"numeric",month:"2-digit",day:"2-digit"}).formatToParts(new Date()),y,m,d,i;for(i=0;i<p.length;i++){if(p[i].type==="year")y=p[i].value;if(p[i].type==="month")m=p[i].value;if(p[i].type==="day")d=p[i].value}return y+"-"+m+"-"+d}
function readStore(){try{var r=localStorage.getItem(SK);if(!r)return {d:"",n:0};var o=JSON.parse(r);return {d:o.d||"",n:typeof o.n==="number"?o.n:0}}catch(e){return {d:"",n:0}}}
function writeStore(d,n){try{localStorage.setItem(SK,JSON.stringify({d:d,n:n}))}catch(e){}}
function usedToday(){var t=ymd(),s=readStore();if(s.d!==t){writeStore(t,0);return 0}return s.n}
function incUsed(){var t=ymd(),s=readStore();if(s.d!==t)s.n=0;s.d=t;s.n++;writeStore(s.d,s.n)}
function remain(){return Math.max(0,LIM-usedToday())}
function updRally(){var r=remain();rallyEl.textContent="残り "+r+" 回";if(r<=0){inp.disabled=true;bSend.disabled=true;bMic.disabled=true;if(recOn&&reco){try{reco.stop()}catch(e){}}bMic.classList.remove("recording");limEl.textContent="本日の会話回数に達しました";limEl.classList.add("visible")}else{inp.disabled=false;bMic.disabled=!micOk;limEl.classList.remove("visible");limEl.textContent="";if(!sending)bSend.disabled=!inp.value.trim()}}
function scrollBot(){requestAnimationFrame(function(){logEl.scrollTop=logEl.scrollHeight})}
function addBubble(role,text,err){var row=document.createElement("div");row.className="row "+(role==="user"?"user":"ai");var b=document.createElement("div");b.className="bubble"+(err?" err":"");b.textContent=text;row.appendChild(b);logEl.appendChild(row);scrollBot()}
function stopAud(){try{if(aud){aud.pause();aud.src=""}}catch(e){}aud=null}
function speak(t){if(!ttsOn||!t)return;stopAud();fetch("/api/tts",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:String(t).replace(/\s+/g," ").trim()})}).then(function(r){if(!r.ok)return r.text().then(function(txt){var j={};try{j=txt?JSON.parse(txt):{}}catch(e){j={}}throw new Error((j&&j.error)||"音声を再生できませんでした")});return r.blob()}).then(function(blob){var u=URL.createObjectURL(blob);var a=new Audio(u);aud=a;a.addEventListener("ended",function(){URL.revokeObjectURL(u)});return a.play()}).catch(function(){})}

function bootstrapGreet(){
  var g="こんにちは😊 今日も一日お疲れ様でした。\n今日はどんな1日でしたか？";
  var opener="今日のことを少し振り返りたいです。よろしくお願いします。";
  apiMsgs=[{role:"user",content:opener},{role:"assistant",content:g}];
  addBubble("ai",g);
  speak(g.replace(/\n/g," "));
}

function send(){
  var t=(inp.value||"").trim();
  if(!t||sending)return;
  if(remain()<=0)return;
  sending=true;
  bSend.disabled=true;
  inp.value="";
  updRally();
  addBubble("user",t);
  apiMsgs.push({role:"user",content:t});
  fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:apiMsgs})})
    .then(function(res){return res.text().then(function(txt){var j={};try{j=txt?JSON.parse(txt):{}}catch(e){j={}}return {res:res,j:j}})})
    .then(function(x){if(!x.res.ok){throw new Error((x.j&&x.j.error)||("エラーが発生しました ("+x.res.status+")"))}var msg=(x.j&&x.j.message)||"";if(!msg)throw new Error("応答が空でした");return msg})
    .then(function(msg){incUsed();apiMsgs.push({role:"assistant",content:msg});addBubble("ai",msg);speak(msg)})
    .catch(function(e){apiMsgs.pop();var lr=logEl.lastElementChild;if(lr&&lr.classList.contains("user")) lr.remove();inp.value=t;var m=e&&e.message?e.message:"通信に失敗しました";addBubble("ai",m,true)})
    .finally(function(){sending=false;updRally()});
}

inp.addEventListener("input",function(){if(remain()<=0||sending)return;bSend.disabled=!inp.value.trim()});

function insNL(el){var s=el.selectionStart,e=el.selectionEnd,v=el.value;el.value=v.slice(0,s)+"\n"+v.slice(e);var p=s+1;el.selectionStart=el.selectionEnd=p}

inp.addEventListener("keydown",function(ev){if(ev.key!=="Enter"||ev.shiftKey){lastEnt=0;return}ev.preventDefault();var now=Date.now();if(now-lastEnt<DBL&&lastEnt>0){lastEnt=0;if(remain()>0&&!sending&&inp.value.trim())send();return}lastEnt=now;insNL(inp)});

bSend.addEventListener("click",function(){if(remain()>0&&!sending)send()});

bTts.addEventListener("click",function(){ttsOn=!ttsOn;bTts.setAttribute("aria-pressed",ttsOn?"true":"false");if(ttsOn){bTts.classList.add("tts-on");bTts.textContent="読み上げ ON"}else{bTts.classList.remove("tts-on");bTts.textContent="読み上げ OFF";stopAud()}});

var SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!micOk){bMic.disabled=true;bMic.title="お使いのブラウザは音声入力に対応していません"}else{
var voiceAcc="";
function startR(){if(recOn||remain()<=0)return;voiceAcc="";reco=new SpeechRecognition();reco.lang="ja-JP";reco.interimResults=true;reco.continuous=true;reco.maxAlternatives=1;reco.onresult=function(ev){var i;for(i=ev.resultIndex;i<ev.results.length;i++){if(ev.results[i].isFinal)voiceAcc+=ev.results[i][0].transcript}};reco.onend=function(){recOn=false;bMic.classList.remove("recording");var add=voiceAcc.replace(/^\s+|\s+$/g,"");if(add){inp.value=inp.value?inp.value+(inp.value.slice(-1)===" "?"":" ")+add:add;inp.dispatchEvent(new Event("input"))}voiceAcc=""};reco.onerror=function(){recOn=false;bMic.classList.remove("recording");voiceAcc=""};try{reco.start();recOn=true;bMic.classList.add("recording")}catch(e){recOn=false;bMic.classList.remove("recording")}}
function stopR(){if(!reco)return;try{reco.stop()}catch(e){}}
bMic.addEventListener("click",function(){if(bMic.disabled||remain()<=0)return;if(recOn)stopR();else startR()})}

updRally();
bootstrapGreet();
inp.focus();
})();
</script>
</body>
</html>

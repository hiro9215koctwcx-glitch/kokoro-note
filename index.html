<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>こころノート</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{--bg:#faf8f5;--white:#fff;--green:#8fa395;--green-deep:#6d8576;--bubble:#e8eee9;--text:#3d3d3d;--muted:#6b6b6b;--danger:#e85d5d;--sh:rgba(80,70,60,.08)}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;min-height:100dvh;font-family:"Noto Sans JP",sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
header{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,rgba(250,248,245,.98),rgba(250,248,245,.92));backdrop-filter:blur(8px);border-bottom:1px solid rgba(143,163,149,.25);padding:max(14px,env(safe-area-inset-top)) 20px 14px}
.header-inner{max-width:560px;margin:0 auto}
.brand{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;width:100%}
#auth-screen.is-hidden{display:none}
.logo{font-weight:600;font-size:1.25rem;letter-spacing:.04em}
.subtitle{width:100%;margin-top:4px;font-size:.8125rem;color:var(--muted)}
.rally-pill{font-size:.8125rem;color:var(--green-deep);background:var(--bubble);padding:6px 12px;border-radius:999px;white-space:nowrap}
main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#chat-log{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px 296px;max-width:560px;margin:0 auto;width:100%}
.row{display:flex;margin-bottom:14px;align-items:flex-end}
.row.ai{justify-content:flex-start}
.row.user{justify-content:flex-end}
.bubble{max-width:88%;padding:14px 16px;border-radius:18px;font-size:.9375rem;line-height:1.65;box-shadow:0 4px 20px var(--sh);word-break:break-word}
.row.ai .bubble{background:var(--white);border-bottom-left-radius:6px}
.row.user .bubble{background:var(--bubble);border-bottom-right-radius:6px}
.bubble.err{background:#fff5f5;color:#8a4444;border:1px solid rgba(232,93,93,.25)}
.bubble strong{font-weight:600;color:inherit}
.bubble em{font-style:italic}
.composer-area{position:fixed;bottom:0;left:0;right:0;padding:12px 16px calc(14px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(250,248,245,0),var(--bg) 18%);border-top:1px solid rgba(143,163,149,.2)}
.composer-inner{max-width:560px;margin:0 auto}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.btn-icon{min-width:46px;height:46px;padding:0 12px;border-radius:999px;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;background:var(--white);color:var(--green-deep);box-shadow:0 2px 12px var(--sh);flex-shrink:0;font-family:inherit;font-size:.75rem;font-weight:500}
.btn-icon.mic{width:46px;min-width:46px;padding:0;font-size:1.1rem}
.btn-icon:active{transform:scale(.96)}.btn-icon.tts-on{background:var(--bubble)}
.btn-icon[disabled]{opacity:.45;cursor:not-allowed}
.btn-icon.mic.recording{background:var(--danger);color:#fff;animation:mp 1s ease-in-out infinite}
@keyframes mp{0%,100%{opacity:1}50%{opacity:.65}}
.input-row{display:flex;gap:10px;align-items:flex-end}
#message-input{flex:1;width:100%;min-height:120px;max-height:200px;height:auto;resize:none;border:1px solid rgba(143,163,149,.45);border-radius:16px;padding:14px 16px;font-family:inherit;font-size:1rem;line-height:1.55;background:var(--white);color:var(--text);overflow-y:auto;-webkit-overflow-scrolling:touch;-webkit-appearance:none}
#message-input:focus{outline:2px solid rgba(109,133,118,.35)}#message-input:disabled{background:#f0ede8;color:var(--muted)}
.btn-send{min-width:72px;min-height:120px;height:auto;align-self:stretch;padding:12px 8px;border:none;border-radius:14px;background:var(--green);color:#fff;font-family:inherit;font-weight:600;font-size:.9375rem;cursor:pointer;box-shadow:0 4px 14px rgba(109,133,118,.35);flex-shrink:0;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.35}
.btn-send:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
.limit-note{max-width:560px;margin:0 auto 8px;padding:0 16px;font-size:.875rem;color:var(--muted);text-align:center;display:none}
.limit-note.visible{display:block}
.hint{margin-top:8px;font-size:.75rem;color:var(--muted);text-align:center}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.header-actions{display:flex;align-items:center;gap:10px;margin-left:auto;flex-wrap:wrap}
.btn-logout{padding:8px 14px;border-radius:999px;border:1px solid rgba(143,163,149,.55);background:var(--white);color:var(--green-deep);font-family:inherit;font-size:.8125rem;font-weight:500;cursor:pointer;box-shadow:0 2px 8px var(--sh)}
.btn-logout:active{transform:scale(.98)}
.auth-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px calc(24px + env(safe-area-inset-bottom));min-height:100dvh}
.auth-card{width:100%;max-width:400px;background:var(--white);padding:28px 24px;border-radius:22px;box-shadow:0 12px 40px var(--sh)}
.auth-title{font-size:1.25rem;font-weight:600;text-align:center;margin:0 0 6px;letter-spacing:.04em}
.auth-lead{font-size:.875rem;color:var(--muted);text-align:center;margin:0 0 22px;line-height:1.55}
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-size:.8125rem;color:var(--green-deep);margin-bottom:6px;font-weight:500}
.auth-field input{width:100%;padding:12px 14px;border:1px solid rgba(143,163,149,.45);border-radius:12px;font-family:inherit;font-size:1rem;background:var(--bg)}
.auth-field input:focus{outline:2px solid rgba(109,133,118,.35)}
.auth-pass-wrap{position:relative;display:block}
.auth-pass-wrap .auth-pass-field{width:100%;padding-right:46px;padding-top:12px;padding-bottom:12px;padding-left:14px}
.auth-pass-eye{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:40px;height:40px;margin:0;border:none;background:rgba(250,248,245,.92);cursor:pointer;font-size:1.15rem;line-height:1;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--muted);box-shadow:none}
.auth-pass-eye:focus{outline:2px solid rgba(109,133,118,.35)}
.auth-hide{display:none !important}
.auth-muted-row{text-align:center;margin-top:12px;margin-bottom:0}
.auth-link-muted{border:none;background:none;color:#898989;font-size:.78rem;cursor:pointer;padding:6px 8px;text-decoration:underline;text-underline-offset:3px;font-family:inherit}
.auth-link-muted:active{opacity:.85}
.auth-success-msg{font-size:.875rem;color:var(--green-deep);margin-top:12px;line-height:1.55;text-align:center}
.auth-actions{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.btn-auth-primary{padding:13px;border:none;border-radius:14px;background:var(--green);color:#fff;font-family:inherit;font-weight:600;font-size:.9375rem;cursor:pointer;box-shadow:0 4px 14px rgba(109,133,118,.35)}
.btn-auth-secondary{padding:13px;border-radius:14px;border:1px solid rgba(143,163,149,.55);background:var(--white);color:var(--green-deep);font-family:inherit;font-size:.875rem;font-weight:500;cursor:pointer}
.auth-switch{text-align:center;font-size:.8125rem;color:var(--muted);margin-top:14px;line-height:1.5}
.auth-switch button{border:none;background:none;color:var(--green-deep);text-decoration:underline;cursor:pointer;padding:0;font:inherit}
.auth-err{font-size:.8125rem;color:#a04444;margin-top:12px;text-align:center}
#main-app{display:none;flex-direction:column;flex:1;min-height:0}
#main-app.is-visible{display:flex}
</style>
</head>
<body>
<div id="auth-screen" class="auth-screen">
  <div id="auth-login-card" class="auth-card">
    <p class="auth-title">こころノート</p>
    <p class="auth-lead" id="auth-lead">5分で気持ちを整えるAI<br />メールでログインして始められます。</p>
    <div id="auth-err" class="auth-err" style="display:none" role="alert"></div>
    <div id="auth-success" class="auth-success-msg" style="display:none" role="status"></div>
    <div class="auth-field"><label for="auth-email">メールアドレス</label><input id="auth-email" type="email" autocomplete="email" required /></div>
    <div id="auth-field-password" class="auth-field"><label for="auth-password">パスワード</label><div class="auth-pass-wrap"><input id="auth-password" class="auth-pass-field" type="text" autocomplete="current-password" required /><button type="button" class="auth-pass-eye" id="auth-pass-eye" aria-label="パスワードを隠す" aria-pressed="true">👁</button></div></div>
    <div class="auth-actions">
      <button type="button" class="btn-auth-primary" id="auth-submit">ログイン</button>
      <button type="button" class="btn-auth-secondary" id="auth-toggle">アカウントをお持ちでない方（新規登録）</button>
    </div>
    <div id="auth-forgot-row" class="auth-muted-row"><button type="button" id="auth-forgot" class="auth-link-muted">パスワードをお忘れの方</button></div>
    <div id="auth-back-reset-row" class="auth-muted-row auth-hide"><button type="button" id="auth-back-login" class="auth-link-muted">ログイン画面に戻る</button></div>
  </div>
  <div id="auth-update-card" class="auth-card auth-hide">
    <p class="auth-title" id="upd-heading">新しいパスワードを設定</p>
    <div id="upd-err" class="auth-err" style="display:none" role="alert"></div>
    <div id="upd-success" class="auth-success-msg" style="display:none" role="status"></div>
    <div class="auth-field"><label for="upd-pass1">新しいパスワード</label><div class="auth-pass-wrap"><input id="upd-pass1" class="auth-pass-field" type="text" autocomplete="new-password" /><button type="button" class="auth-pass-eye" id="upd-eye1" aria-label="パスワードを隠す" aria-pressed="true">👁</button></div></div>
    <div class="auth-field"><label for="upd-pass2">パスワード確認</label><div class="auth-pass-wrap"><input id="upd-pass2" class="auth-pass-field" type="text" autocomplete="new-password" /><button type="button" class="auth-pass-eye" id="upd-eye2" aria-label="パスワードを隠す" aria-pressed="true">👁</button></div></div>
    <div class="auth-actions"><button type="button" class="btn-auth-primary" id="upd-submit">パスワードを更新する</button></div>
  </div>
</div>

<div id="main-app">
<header><div class="header-inner"><div class="brand">
<span class="logo">こころノート</span>
<div class="header-actions"><span class="rally-pill" id="rally-display" aria-live="polite">残り 5 回</span><button type="button" class="btn-logout" id="btn-logout">ログアウト</button></div>
</div><p class="subtitle">5分で気持ちを整えるAI</p></div></header>
<p class="limit-note" id="limit-note" aria-live="assertive"></p>
<main><div id="chat-log" role="log" aria-label="チャットメッセージ"></div></main>
<div class="composer-area"><div class="composer-inner"><div class="toolbar">
<button type="button" class="btn-icon tts-on" id="btn-tts" aria-pressed="true">読み上げ ON</button>
<button type="button" class="btn-icon mic" id="btn-mic" aria-label="音声入力">🎤</button>
</div><div class="input-row">
<label class="sr-only" for="message-input">メッセージ入力</label>
<textarea id="message-input" rows="5" placeholder="気持ちを書いてみましょう" autocomplete="off"></textarea>
<button type="button" class="btn-send" id="btn-send">送信</button>
</div><p class="hint">Enter で改行 · Enter を続けて2回で送信</p></div></div>
</div>

<script>
(function(){
"use strict";
var SESS_KEY="kokoro_session";
var MSG_SNAP="kokoro_msgs_v1";
var LIM=5,DBL=700;
var remainCount=LIM;
var registerMode=false,resetMode=false,passVisible=true,passVisibleUpd1=true,passVisibleUpd2=true;
var recoveryAccessToken=null,updReturnTimer=null;
var LEAD_HTML_DEFAULT="5分で気持ちを整えるAI<br />メールでログインして始められます。";
var MSG_RESET_LEAD="登録済みのメールアドレスへ、パスワード再設定用のリンクをお送りします。";
var apiMsgs=[],ttsOn=true,lastEnt=0,aud=null,reco=null,recOn=false,sending=false,micOk=!!(window.SpeechRecognition||window.webkitSpeechRecognition);

var authScreen=document.getElementById("auth-screen");
var authLoginCard=document.getElementById("auth-login-card");
var authUpdateCard=document.getElementById("auth-update-card");
var mainApp=document.getElementById("main-app");
var authErr=document.getElementById("auth-err");
var authSucc=document.getElementById("auth-success");
var authLead=document.getElementById("auth-lead");
var authEmail=document.getElementById("auth-email");
var authPass=document.getElementById("auth-password");
var authSubmit=document.getElementById("auth-submit");
var authToggle=document.getElementById("auth-toggle");
var authFieldPw=document.getElementById("auth-field-password");
var authForgotRow=document.getElementById("auth-forgot-row");
var authForgot=document.getElementById("auth-forgot");
var authBackResetRow=document.getElementById("auth-back-reset-row");
var authBackLogin=document.getElementById("auth-back-login");
var authPassEye=document.getElementById("auth-pass-eye");
var updPass1=document.getElementById("upd-pass1");
var updPass2=document.getElementById("upd-pass2");
var updEye1=document.getElementById("upd-eye1");
var updEye2=document.getElementById("upd-eye2");
var updSubmit=document.getElementById("upd-submit");
var updErr=document.getElementById("upd-err");
var updSucc=document.getElementById("upd-success");
var btnLogout=document.getElementById("btn-logout");

var logEl=document.getElementById("chat-log"),inp=document.getElementById("message-input"),bSend=document.getElementById("btn-send"),bMic=document.getElementById("btn-mic"),bTts=document.getElementById("btn-tts"),rallyEl=document.getElementById("rally-display"),limEl=document.getElementById("limit-note");

function resolveApi(rel){try{rel=String(rel||"").replace(/^\/*/,"");var raw=(window.location.pathname||"/").split("?")[0]||"/";if(raw.slice(-1)==="/")return raw+rel;var leaf=raw.slice(raw.lastIndexOf("/")+1);if(leaf.indexOf(".")!==-1){var d=raw.slice(0,raw.lastIndexOf("/")+1);return(d||"/")+rel}return raw+"/"+rel}catch(err){logErr("[API "+rel+"]",err);return"/"+rel}}
function authResetPasswordUrl(){var b=resolveApi("api/auth");return b.indexOf("?")>=0?b+"&action=resetPassword":b+"?action=resetPassword"}
function authUpdatePasswordUrl(){var b=resolveApi("api/auth");return b.indexOf("?")>=0?b+"&action=updatePassword":b+"?action=updatePassword"}
function resetPasswordViaApi(email){return fetch(authResetPasswordUrl(),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email}),credentials:"same-origin"}).then(function(res){return res.text().then(function(txt){var j={};try{j=txt?JSON.parse(txt):{}}catch(e){}return{res:res,j:j};})}).then(function(x){if(!x.res.ok){var m=(x.j&&x.j.error)||("HTTP "+x.res.status);if(x.j&&x.j.code)m+=" （code:"+x.j.code+"）";if(typeof x.j.status==="number")m+=" （status:"+x.j.status+"）";throw new Error(m.trim());}if(!x.j||x.j.success!==true)throw new Error((x.j&&x.j.error)||"パスワードリセットメールを送信できませんでした");})}
function updatePasswordViaApi(accessToken,password){return fetch(authUpdatePasswordUrl(),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:password,access_token:accessToken}),credentials:"same-origin"}).then(function(res){return res.text().then(function(txt){var j={};try{j=txt?JSON.parse(txt):{}}catch(e){}return{res:res,j:j};})}).then(function(x){if(!x.res.ok){var m=(x.j&&x.j.error)||("HTTP "+x.res.status);if(x.j&&x.j.code)m+=" （code:"+x.j.code+"）";if(typeof x.j.status==="number")m+=" （status:"+x.j.status+"）";throw new Error(m.trim());}if(!x.j||x.j.success!==true)throw new Error((x.j&&x.j.error)||"パスワードを更新できませんでした");})}
function logErr(scope,err){try{console.error(scope,err&&(err.stack||err.message||err)||err)}catch(e){}}
window.addEventListener("error",function(ev){try{console.error(ev.message,ev.filename,ev.lineno)}catch(e){}});
window.addEventListener("unhandledrejection",function(ev){try{console.error("未処理Promise:",ev.reason)}catch(e){}});

function getTok(){try{var s=sessionStorage.getItem(SESS_KEY);if(!s)return null;var o=JSON.parse(s);return o.access_token||null}catch(e){return null}}
function userId(){try{var s=sessionStorage.getItem(SESS_KEY);if(!s)return null;var o=JSON.parse(s);if(!o.user)return null;return o.user.id||null}catch(e){return null}}
function setSession(data){sessionStorage.setItem(SESS_KEY,JSON.stringify(data))}
function clearSessionAll(){try{sessionStorage.removeItem(SESS_KEY);sessionStorage.removeItem(MSG_SNAP)}catch(e){}}

function persistSnapshot(){try{var id=userId();if(!id)return;var o={userId:id,messages:apiMsgs,remaining:remainCount};sessionStorage.setItem(MSG_SNAP,JSON.stringify(o))}catch(e){}}

function renderAllBubbles(){logEl.innerHTML="";var i,m;for(i=0;i<apiMsgs.length;i++){m=apiMsgs[i];if(m.role==="user")addBubble("user",m.content,false);else addBubble("ai",m.content,false)}scrollBot()}

function loadSnapshot(){try{var raw=sessionStorage.getItem(MSG_SNAP);if(!raw)return false;var o=JSON.parse(raw);if(!o.userId||o.userId!==userId()||!Array.isArray(o.messages)||!o.messages.length)return false;apiMsgs=o.messages.slice();if(typeof o.remaining==="number")remainCount=o.remaining;renderAllBubbles();updRallyRemain(remainCount);return true}catch(e){return false}}

function chatHeaders(){var h={"Content-Type":"application/json"};var t=getTok();if(t)h.Authorization="Bearer "+t;return h}

function remain(){return remainCount}
function updRallyRemain(r){if(typeof r==="number")remainCount=r;rallyEl.textContent="残り "+remainCount+" 回";if(remainCount<=0){inp.disabled=true;bSend.disabled=true;bMic.disabled=true;if(recOn&&reco){try{reco.stop()}catch(e){}}bMic.classList.remove("recording");limEl.textContent="本日の会話回数に達しました";limEl.classList.add("visible")}else{inp.disabled=false;bMic.disabled=!micOk;limEl.classList.remove("visible");limEl.textContent="";if(!sending)bSend.disabled=!inp.value.trim()}}

function showAuthView(){
  authScreen.classList.remove("is-hidden");
  mainApp.classList.remove("is-visible");
  stopAud();
  recoveryAccessToken=null;
  if(updReturnTimer){clearTimeout(updReturnTimer);updReturnTimer=null}
  authLoginCard.classList.remove("auth-hide");
  authUpdateCard.classList.add("auth-hide");
}
function showChatView(){authScreen.classList.add("is-hidden");mainApp.classList.add("is-visible")}

function authErrShow(t){authErr.style.display="block";authErr.textContent=t||""}
function authErrHide(){authErr.style.display="none";authErr.textContent=""}
function authSuccessShow(t){authSucc.style.display="block";authSucc.textContent=t||""}
function authSuccessHide(){authSucc.style.display="none";authSucc.textContent=""}

function parseRecoveryAccessToken(){try{var qs=window.location.search||"",h=(window.location.hash||"").replace(/^#/,""),t,re=/access_token=/;if(h&&re.test(h)){t=new URLSearchParams(h).get("access_token");if(t)return t}if(qs&&re.test(qs)){t=new URLSearchParams(qs.charAt(0)==="?"?qs.slice(1):qs).get("access_token");if(t)return t}}catch(e){}return null}
function stripAuthFromUrl(){try{var u=new URL(window.location.href);u.hash="";var sp=new URLSearchParams(u.search);["access_token","refresh_token","expires_in","token_type","type"].forEach(function(k){sp.delete(k)});var qq=sp.toString();u.search=qq?"?"+qq:"";history.replaceState(null,"",u.pathname+u.search+u.hash)}catch(e){}}
function updErrShow(t){updErr.style.display="block";updErr.textContent=t||""}
function updErrHide(){updErr.style.display="none";updErr.textContent=""}
function updSuccessShow(t){updSucc.style.display="block";updSucc.textContent=t||""}
function updSuccessHide(){updSucc.style.display="none";updSucc.textContent=""}
function applyUpdPassVisibility(){if(updPass1){updPass1.type=passVisibleUpd1?"text":"password";if(updEye1){updEye1.setAttribute("aria-pressed",passVisibleUpd1?"true":"false");updEye1.setAttribute("aria-label",passVisibleUpd1?"パスワードを隠す":"パスワードを表示")}}if(updPass2){updPass2.type=passVisibleUpd2?"text":"password";if(updEye2){updEye2.setAttribute("aria-pressed",passVisibleUpd2?"true":"false");updEye2.setAttribute("aria-label",passVisibleUpd2?"パスワードを隠す":"パスワードを表示")}}}
function enterRecoveryPasswordFlow(tok){if(updReturnTimer){clearTimeout(updReturnTimer);updReturnTimer=null}clearSessionAll();recoveryAccessToken=tok;authScreen.classList.remove("is-hidden");mainApp.classList.remove("is-visible");authLoginCard.classList.add("auth-hide");authUpdateCard.classList.remove("auth-hide");updErrHide();updSuccessHide();updPass1.value="";updPass2.value="";applyUpdPassVisibility();stripAuthFromUrl()}
function submitUpdatePassword(){updErrHide();updSuccessHide();var tok=recoveryAccessToken;if(!tok){updErrShow("セッション情報が見つかりません。メールのリンクをもう一度開いてください。");return}var p1=(updPass1&&updPass1.value)||"",p2=(updPass2&&updPass2.value)||"";if(!p1||!p2){updErrShow("新しいパスワードと確認を入力してください");return}if(p1!==p2){updErrShow("パスワードが一致しません");return}updSubmit.disabled=true;updatePasswordViaApi(tok,p1).then(function(){updSuccessShow("パスワードを更新しました。ログインしてください。");if(updReturnTimer)clearTimeout(updReturnTimer);updReturnTimer=setTimeout(function(){updReturnTimer=null;recoveryAccessToken=null;updSuccessHide();authLoginCard.classList.remove("auth-hide");authUpdateCard.classList.add("auth-hide");syncAuthUi()},3000)}).catch(function(e){updErrShow(e&&e.message?e.message:"更新に失敗しました")}).finally(function(){updSubmit.disabled=false})}

function applyPassVisibility(){authPass.type=passVisible?"text":"password";if(authPassEye){authPassEye.setAttribute("aria-pressed",passVisible?"true":"false");authPassEye.setAttribute("aria-label",passVisible?"パスワードを隠す":"パスワードを表示")}}

function syncAuthUi(){
  if(resetMode){authLead.textContent=MSG_RESET_LEAD;authFieldPw.classList.add("auth-hide");authForgotRow.classList.add("auth-hide");authToggle.classList.add("auth-hide");authBackResetRow.classList.remove("auth-hide");authSubmit.textContent="パスワードリセットメールを送信する"}
  else{authLead.innerHTML=LEAD_HTML_DEFAULT;authFieldPw.classList.remove("auth-hide");authToggle.classList.remove("auth-hide");authForgotRow.classList.toggle("auth-hide",registerMode);authBackResetRow.classList.add("auth-hide");authSubmit.textContent=registerMode?"新規登録":"ログイン";authToggle.textContent=registerMode?"ログインへ戻る":"アカウントをお持ちでない方（新規登録）"}
  applyPassVisibility();
}

function scrollBot(){requestAnimationFrame(function(){logEl.scrollTop=logEl.scrollHeight})}
function escapeHtml(x){return String(x).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}
function formatAiBubbleHtml(raw){var s=escapeHtml(raw||"");s=s.replace(/\*\*([\s\S]*?)\*\*/g,"<strong>$1</strong>");s=s.replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g,"$1<em>$2</em>");s=s.replace(/\n/g,"<br>");return s}
function stripMarkdownForSpeech(raw){var s=String(raw||"");s=s.replace(/\*\*([\s\S]*?)\*\*/g,"$1");s=s.replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g,"$1$2");return s.replace(/\*+/g," ").replace(/\s+/g," ").trim()}
function addBubble(role,text,err){var row=document.createElement("div");row.className="row "+(role==="user"?"user":"ai");var b=document.createElement("div");b.className="bubble"+(err?" err":"");if(!err&&role==="ai"){b.innerHTML=formatAiBubbleHtml(text)}else{b.textContent=text}row.appendChild(b);logEl.appendChild(row);scrollBot()}
function stopAud(){try{if(aud){aud.pause();aud.src=""}}catch(e){}aud=null}
var ttsPrimed=false;
function primeAudioPlayback(){if(ttsPrimed)return;try{var AC=window.AudioContext||window.webkitAudioContext;if(AC){var ctx=new AC();var resume=ctx.resume&&ctx.resume.bind(ctx);if(resume){resume().catch(function(){})}var osc=ctx.createOscillator(),gain=ctx.createGain();gain.gain.value=0;osc.connect(gain);gain.connect(ctx.destination);osc.start(0);osc.stop(ctx.currentTime+0.02)}}catch(e){logErr("[TTS prime]",e)}finally{ttsPrimed=true}}

function speak(t){if(!ttsOn||!t)return;var url=resolveApi("api/tts"),txt=stripMarkdownForSpeech(t);if(!txt)return;stopAud();fetch(url,{method:"POST",headers:{"Content-Type":"application/json; charset=UTF-8"},body:JSON.stringify({text:txt}),credentials:"same-origin"}).then(function(r){return r.blob().then(function(blob){return{r:r,blob:blob}})}).then(function(x){var hdr=(x.r.headers&&x.r.headers.get&&x.r.headers.get("content-type")||"").toLowerCase(),ct=hdr.indexOf("application/json")!==-1||hdr.indexOf("json")!==-1;if(!x.r.ok||ct){return x.blob.text().then(function(raw){var j={};try{j=raw?JSON.parse(raw):{}}catch(e){}throw new Error((j&&j.error)||raw||("TTS HTTP "+x.r.status))})}if(!x.blob||x.blob.size===0)throw new Error("音声データが空です");return x.blob}).then(function(blob){var u=URL.createObjectURL(blob),a=new Audio();a.src=u;aud=a;var cleanup=function(){try{URL.revokeObjectURL(u)}catch(e){}a.removeEventListener("ended",cleanup);a.removeEventListener("error",onErr)};var onErr=function(){cleanup();logErr("[TTS 要素エラー]",a.error||"Audio error")};a.addEventListener("ended",cleanup);a.addEventListener("error",onErr);return a.play().then(function(){return null}).catch(function(playErr){cleanup();throw playErr||new Error("再生がブロックされました（ブラウザの自動再生制限の可能性）")})}).catch(function(err){logErr("[TTS] "+url,err)})}

function initFromServer(){
  sending=true;
  bSend.disabled=true;
  var opener={role:"user",content:"今日の振り返りを始めたいです。よろしくお願いします。"};
  fetch(resolveApi("api/chat"),{method:"POST",headers:chatHeaders(),body:JSON.stringify({init:true,messages:[opener]})})
    .then(function(res){return res.text().then(function(txt){var j={};try{j=txt?JSON.parse(txt):{}}catch(e){}return {res:res,j:j}})})
    .then(function(x){if(!x.res.ok){throw new Error(String((x.j&&x.j.error)||"[chat-init] "+x.res.status));}var msg=(x.j&&x.j.message)||"";if(!msg)throw new Error("応答が空でした");
      apiMsgs=[opener,{role:"assistant",content:msg}];
      logEl.innerHTML="";
      renderAllBubbles();
      persistSnapshot();
      if(typeof x.j.remaining==="number")updRallyRemain(x.j.remaining);
      if(x.j&&x.j.saveOk===false)logErr("[会話保存]",new Error("保存に一部失敗した可能性があります"));
      speak(msg);
    })
    .catch(function(e){logErr("[init]",e);var fb="初回メッセージを取得できませんでした。再読み込みしてください。";addBubble("ai",(e&&e.message)?e.message:fb,true)})
    .finally(function(){sending=false;updRallyRemain(remainCount);try{inp.focus()}catch(z){}});
}

function submitRecover(){authErrHide();authSuccessHide();var em=(authEmail.value||"").trim();if(!em){authErrShow("メールアドレスを入力してください");return}
authSubmit.disabled=true;
resetPasswordViaApi(em).then(function(){authSuccessShow("パスワードリセットメールを送信しました")}).catch(function(e){authErrShow(e&&e.message?e.message:"送信に失敗しました")}).finally(function(){authSubmit.disabled=false});
}
function submitAuth(){authErrHide();authSuccessHide();if(resetMode){submitRecover();return}var em=(authEmail.value||"").trim(),pw=authPass.value||"";if(!em||!pw){authErrShow("メールアドレスとパスワードを入力してください");return}
authSubmit.disabled=true;
fetch(resolveApi("api/auth"),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:registerMode?"signUp":"signIn",email:em,password:pw})})
  .then(function(res){return res.text().then(function(txt){var j={};try{j=txt?JSON.parse(txt):{}}catch(e){}return {res:res,j:j}})})
  .then(function(x){if(!x.res.ok)throw new Error((x.j&&x.j.error)||"認証に失敗しました");if(x.j.needEmailConfirm){authErrShow(x.j.message||"確認メールをご確認ください");return}if(!x.j.access_token)throw new Error("トークンを取得できませんでした");
    sessionStorage.removeItem(MSG_SNAP);
    var sess={access_token:x.j.access_token,refresh_token:x.j.refresh_token,user:x.j.user};
    setSession(sess);
    if(typeof x.j.limit==="number")LIM=x.j.limit;
    if(typeof x.j.remaining==="number")updRallyRemain(x.j.remaining);
    authPass.value="";
    showChatView();
    logEl.innerHTML="";apiMsgs=[];
    initFromServer();
  })
  .catch(function(e){authErrShow(e&&e.message?e.message:"通信エラーです")})
  .finally(function(){authSubmit.disabled=false});
}

updEye1.addEventListener("click",function(){passVisibleUpd1=!passVisibleUpd1;applyUpdPassVisibility()});
updEye2.addEventListener("click",function(){passVisibleUpd2=!passVisibleUpd2;applyUpdPassVisibility()});
updSubmit.addEventListener("click",submitUpdatePassword);

authToggle.addEventListener("click",function(){registerMode=!registerMode;resetMode=false;syncAuthUi();authErrHide();authSuccessHide()});
authForgot.addEventListener("click",function(){resetMode=true;registerMode=false;syncAuthUi();authErrHide();authSuccessHide()});
authBackLogin.addEventListener("click",function(){resetMode=false;syncAuthUi();authErrHide();authSuccessHide()});
authPassEye.addEventListener("click",function(){passVisible=!passVisible;applyPassVisibility()});
authSubmit.addEventListener("click",submitAuth);
btnLogout.addEventListener("click",function(){clearSessionAll();apiMsgs=[];logEl.innerHTML="";remainCount=LIM;showAuthView();resetMode=false;registerMode=false;syncAuthUi();authErrHide();authSuccessHide();stopAud();inp.value="";updRallyRemain(LIM)});

function tryResumeSession(){var tok=getTok();if(!tok){showAuthView();return}
fetch(resolveApi("api/auth"),{method:"GET",headers:{Authorization:"Bearer "+tok}})
  .then(function(res){return res.text().then(function(txt){var j={};try{j=txt?JSON.parse(txt):{}}catch(e){}return {res:res,j:j}})})
  .then(function(x){if(!x.res.ok){throw new Error("ng");}if(typeof x.j.limit==="number")LIM=x.j.limit;
    if(typeof x.j.remaining==="number")updRallyRemain(x.j.remaining);
    showChatView();
    if(loadSnapshot()){try{inp.focus()}catch(z){};return}
    logEl.innerHTML="";apiMsgs=[];
    initFromServer();
  })
  .catch(function(){clearSessionAll();showAuthView()});
}

function send(){
  primeAudioPlayback();
  var t=(inp.value||"").trim();
  if(!t||sending)return;
  if(remain()<=0)return;
  sending=true;
  bSend.disabled=true;
  inp.value="";
  updRallyRemain(remainCount);
  addBubble("user",t);
  apiMsgs.push({role:"user",content:t});
  fetch(resolveApi("api/chat"),{method:"POST",headers:chatHeaders(),body:JSON.stringify({messages:apiMsgs})})
    .then(function(res){return res.text().then(function(txt){var j={};try{j=txt?JSON.parse(txt):{}}catch(e){}return {res:res,j:j}})})
    .then(function(x){if(!x.res.ok){var er=(x.j&&x.j.error)||("エラー ("+x.res.status+")");var err=new Error(er);err._status=x.res.status;throw err}var msg=(x.j&&x.j.message)||"";if(!msg)throw new Error("応答が空でした");if(typeof x.j.remaining==="number")updRallyRemain(x.j.remaining);apiMsgs.push({role:"assistant",content:msg});addBubble("ai",msg);persistSnapshot();if(x.j&&x.j.saveOk===false)logErr("[会話保存]",new Error("保存に一部失敗した可能性があります"));speak(msg)})
    .catch(function(e){apiMsgs.pop();var lr=logEl.lastElementChild;if(lr&&lr.classList.contains("user"))lr.remove();inp.value=t;var m=e&&e.message?e.message:"通信に失敗しました";if(e&&e._status===429)m="本日の会話回数に達しました";addBubble("ai",m,true);if(e&&e._status===429)updRallyRemain(0)})
    .finally(function(){sending=false;updRallyRemain(remainCount)});
}

inp.addEventListener("input",function(){if(remain()<=0||sending)return;bSend.disabled=!inp.value.trim()});

function insNL(el){var s=el.selectionStart,e=el.selectionEnd,v=el.value;el.value=v.slice(0,s)+"\n"+v.slice(e);var p=s+1;el.selectionStart=el.selectionEnd=p}

inp.addEventListener("keydown",function(ev){if(ev.key!=="Enter"||ev.shiftKey){lastEnt=0;return}ev.preventDefault();var now=Date.now();if(now-lastEnt<DBL&&lastEnt>0){lastEnt=0;if(remain()>0&&!sending&&inp.value.trim())send();return}lastEnt=now;insNL(inp)});

bSend.addEventListener("click",function(){if(remain()>0&&!sending)send()});

bTts.addEventListener("click",function(){ttsOn=!ttsOn;bTts.setAttribute("aria-pressed",ttsOn?"true":"false");if(ttsOn){primeAudioPlayback();bTts.classList.add("tts-on");bTts.textContent="読み上げ ON"}else{bTts.classList.remove("tts-on");bTts.textContent="読み上げ OFF";stopAud()}});

var SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!micOk){bMic.disabled=true;bMic.title="お使いのブラウザは音声入力に対応していません"}else{
var voicePrefix="",voiceFinalAcc="";
function paintVoiceInput(interim){interim=typeof interim==="string"?interim:"";var combo=(voicePrefix||"")+(voiceFinalAcc||"")+(interim||"");if(inp.value!==combo){inp.value=combo}var len=combo.length;try{inp.selectionStart=len;inp.selectionEnd=len}catch(e){}}
function startR(){if(recOn||remain()<=0)return;var cur=(inp.value||"").replace(/\s+$/,"");voicePrefix=cur?cur+" ":"";voiceFinalAcc="";reco=new SpeechRecognition();reco.lang="ja-JP";reco.interimResults=true;reco.continuous=true;reco.maxAlternatives=1;reco.onresult=function(ev){var i,ch,inter="",fin="";for(i=ev.resultIndex;i<ev.results.length;i++){ch=(ev.results[i]&&ev.results[i][0]&&ev.results[i][0].transcript)||"";if(ev.results[i].isFinal)fin+=ch;else inter+=ch}if(fin)voiceFinalAcc+=fin;paintVoiceInput(inter)};reco.onend=function(){recOn=false;bMic.classList.remove("recording");reco=null;voicePrefix="";voiceFinalAcc="";inp.dispatchEvent(new Event("input"))};reco.onerror=function(){recOn=false;bMic.classList.remove("recording");reco=null;voicePrefix="";voiceFinalAcc="";inp.dispatchEvent(new Event("input"))};try{reco.start();recOn=true;bMic.classList.add("recording")}catch(err){recOn=false;bMic.classList.remove("recording");reco=null}}
function stopR(){if(!reco)return;try{reco.stop()}catch(err){}}
bMic.addEventListener("click",function(){if(bMic.disabled||remain()<=0)return;if(recOn)stopR();else startR()})}

var rtParse=parseRecoveryAccessToken();if(rtParse){enterRecoveryPasswordFlow(rtParse)}else{recoveryAccessToken=null;syncAuthUi();tryResumeSession()}
["pointerdown","touchstart","click"].forEach(function(evt){document.body.addEventListener(evt,primeAudioPlayback,{once:true,passive:true})});
})();
